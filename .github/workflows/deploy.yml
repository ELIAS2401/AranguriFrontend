name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production --base-href /AranguriFrontend/

      - name: Create 404.html for SPA routing
        run: cp dist/browser/index.html dist/browser/404.html

      - name: Deploy to gh-pages branch
        run: |
          npx angular-cli-ghpages \
            --dir=dist/browser \
            --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            --name=github-actions \
            --email=actions@github.com \
            --no-silent \
            --message="Deploy $(date +'%Y-%m-%d %H:%M')"
